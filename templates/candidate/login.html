<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTME SQUAD - Candidate Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b', 700: '#334155' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .animate-slide-in { animation: slideIn 0.4s ease-out; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .admin-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
    <!-- Background Effects -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl animate-pulse" style="animation-delay: 1s"></div>
    </div>

    <div class="w-full max-w-md animate-slide-in relative z-10">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-24 h-24 admin-gradient rounded-2xl mb-4 shadow-2xl shadow-purple-500/30">
                <i class="fas fa-graduation-cap text-4xl text-white"></i>
            </div>
            <h1 class="text-4xl font-bold mb-2 bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                UTME SQUAD
            </h1>
            <p class="text-slate-400">Secure Examination Platform</p>
            <div class="flex items-center justify-center gap-2 mt-3 text-xs text-slate-500">
                <i class="fas fa-shield-alt text-green-400"></i>
                <span>Protected by advanced security</span>
            </div>
        </div>

        <!-- Login Form -->
        <div class="glass-panel rounded-3xl p-8 shadow-2xl">
            <!-- Login Type Tabs -->
            <div class="flex space-x-2 mb-6 p-1 bg-slate-800/50 rounded-xl">
                <button id="adminTab" onclick="setLoginType('admin')"
                    class="flex-1 py-2 px-4 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-white">
                    <i class="fas fa-shield-alt mr-2"></i>Admin
                </button>
                <button id="memberTab" onclick="setLoginType('member')"
                    class="flex-1 py-2 px-4 rounded-lg text-sm font-medium transition-all bg-pink-600 text-white">
                    <i class="fas fa-user mr-2"></i>Candidate
                </button>
            </div>

            <div class="space-y-4" id="candidateLoginForm">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Registration Number</label>
                    <input type="text" id="regNumberInput" placeholder="e.g., UTME-2026-001"
                        class="w-full px-4 py-4 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition-all text-lg font-mono uppercase"
                        onkeypress="if (event.key === 'Enter') candidateLogin();">
                    <p class="text-xs text-slate-500 mt-2">Enter your registration number</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <div class="relative">
                        <input type="password" id="candidatePasswordInput" placeholder="Enter your password"
                            class="w-full px-4 py-4 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition-all text-lg"
                            onkeypress="if (event.key === 'Enter') candidateLogin();">
                        <button type="button" onclick="toggleCandidatePassword()" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-white">
                            <i class="fas fa-eye" id="candidateEyeIcon"></i>
                        </button>
                    </div>
                    <p class="text-xs text-slate-500 mt-2">Password given to you by admin at registration</p>
                </div>

                <button onclick="candidateLogin()"
                    class="w-full py-4 admin-gradient hover:opacity-90 rounded-xl font-bold text-lg shadow-lg shadow-purple-500/25 transition-all transform hover:scale-[1.02]">
                    <i class="fas fa-sign-in-alt mr-2"></i>Access Candidate Portal
                </button>
            </div>

            <!-- Admin Login Form (hidden by default) -->
            <div class="space-y-4 hidden" id="adminLoginForm">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Admin Password</label>
                    <div class="relative">
                        <input type="password" id="adminPasswordInput" placeholder="Enter admin password"
                            class="w-full px-4 py-4 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition-all text-lg"
                            onkeypress="if (event.key === 'Enter') adminLogin();">
                        <button onclick="toggleAdminPassword()" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-white">
                            <i class="fas fa-eye" id="adminEyeIcon"></i>
                        </button>
                    </div>
                </div>
                <button onclick="adminLogin()"
                    class="w-full py-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:opacity-90 rounded-xl font-bold text-lg shadow-lg shadow-purple-500/25 transition-all transform hover:scale-[1.02]">
                    <span>Access Admin Portal</span>
                </button>
            </div>

            <!-- Error Message -->
            <div id="errorMsg" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg text-red-400 text-sm text-center"></div>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-slate-600 mt-6">
            <i class="fas fa-lock mr-1"></i> All login attempts are monitored for security
        </p>
    </div>

    <script>
        let loginType = 'member';

        function setLoginType(type) {
            loginType = type;
            const adminTab = document.getElementById('adminTab');
            const memberTab = document.getElementById('memberTab');
            const candidateForm = document.getElementById('candidateLoginForm');
            const adminForm = document.getElementById('adminLoginForm');

            if (type === 'admin') {
                adminTab.className = 'flex-1 py-2 px-4 rounded-lg text-sm font-medium transition-all bg-purple-600 text-white';
                memberTab.className = 'flex-1 py-2 px-4 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-white';
                candidateForm.classList.add('hidden');
                adminForm.classList.remove('hidden');
                document.getElementById('adminPasswordInput').focus();
            } else {
                adminTab.className = 'flex-1 py-2 px-4 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-white';
                memberTab.className = 'flex-1 py-2 px-4 rounded-lg text-sm font-medium transition-all bg-pink-600 text-white';
                candidateForm.classList.remove('hidden');
                adminForm.classList.add('hidden');
                document.getElementById('regNumberInput').focus();
            }
            document.getElementById('errorMsg').classList.add('hidden');
        }

        function toggleAdminPassword() {
            const input = document.getElementById('adminPasswordInput');
            const icon = document.getElementById('adminEyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function getCsrfToken() {
            const name = 'csrftoken';
            const cookies = document.cookie.split(';');
            for (let c of cookies) {
                const trimmed = c.trim();
                const eqIdx = trimmed.indexOf('=');
                if (eqIdx > -1 && trimmed.substring(0, eqIdx) === name) {
                    return decodeURIComponent(trimmed.substring(eqIdx + 1));
                }
            }
            return '';
        }

        let candidateFailures = 0;
        let adminFailures = 0;
        let adminLockUntil = 0;
        const MAX_ADMIN_ATTEMPTS = 5;
        const LOCKOUT_SECS = 30;

        function toggleCandidatePassword() {
            const input = document.getElementById('candidatePasswordInput');
            const icon = document.getElementById('candidateEyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        async function candidateLogin() {
            const regNumber = document.getElementById('regNumberInput').value.trim().toUpperCase();
            const password = document.getElementById('candidatePasswordInput').value.trim();
            const errorDiv = document.getElementById('errorMsg');

            if (!regNumber) {
                errorDiv.textContent = 'Please enter your registration number.';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (!password) {
                errorDiv.textContent = 'Please enter your password.';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/auth/candidate-login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: JSON.stringify({ reg_number: regNumber, password: password })
                });

                if (response.ok) {
                    window.location.href = '/candidate/dashboard/';
                } else {
                    const data = await response.json().catch(() => ({}));
                    errorDiv.textContent = data.error || 'Invalid registration number or password.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        }

        async function adminLogin() {
            const now = Date.now();
            const password = document.getElementById('adminPasswordInput').value.trim();
            const errorDiv = document.getElementById('errorMsg');

            if (adminLockUntil > now) {
                const secsLeft = Math.ceil((adminLockUntil - now) / 1000);
                errorDiv.textContent = `Too many attempts. Try again in ${secsLeft}s.`;
                errorDiv.classList.remove('hidden');
                return;
            }

            if (!password) {
                errorDiv.textContent = 'Please enter admin password.';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/auth/admin-login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    window.location.href = '/admin/dashboard/';
                } else {
                    adminFailures++;
                    const data = await response.json().catch(() => ({}));
                    if (adminFailures >= MAX_ADMIN_ATTEMPTS) {
                        adminLockUntil = Date.now() + LOCKOUT_SECS * 1000;
                        errorDiv.textContent = `Too many failed attempts. Locked for ${LOCKOUT_SECS} seconds.`;
                    } else {
                        errorDiv.textContent = data.error || `Incorrect password. ${MAX_ADMIN_ATTEMPTS - adminFailures} attempt(s) remaining.`;
                    }
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
