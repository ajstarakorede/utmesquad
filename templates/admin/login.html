<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTME SQUAD - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            950: '#020617',
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .animate-slide-in { animation: slideIn 0.4s ease-out; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .admin-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
    <!-- Background Effects -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl animate-pulse" style="animation-delay: 1s"></div>
    </div>

    <div class="w-full max-w-md animate-slide-in relative z-10">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-24 h-24 admin-gradient rounded-2xl mb-4 shadow-2xl shadow-purple-500/30">
                <i class="fas fa-shield-alt text-4xl text-white"></i>
            </div>
            <h1 class="text-4xl font-bold mb-2 bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                UTME SQUAD
            </h1>
            <p class="text-slate-400">Admin Portal</p>
        </div>

        <!-- Login Form -->
        <div class="glass-panel rounded-3xl p-8 shadow-2xl">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Admin Password</label>
                    <div class="relative">
                        <input type="password" id="passwordInput" placeholder="Enter admin password"
                            class="w-full px-4 py-4 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition-all text-lg"
                            onkeypress="if (event.key === 'Enter') login();">
                        <button onclick="togglePassword()" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-white">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    
                </div>

                <button onclick="login()"
                    id="loginBtn" class="w-full py-4 admin-gradient hover:opacity-90 rounded-xl font-bold text-lg shadow-lg shadow-purple-500/25 transition-all transform hover:scale-[1.02]">
                    <i class="fas fa-shield-alt mr-2"></i>Access Admin Portal
                </button>
            </div>

            <!-- Error Message -->
            <div id="errorMsg" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg text-red-400 text-sm text-center"></div>
        </div>

        <!-- Back Link -->
        <p class="text-center text-xs text-slate-600 mt-6">
            <a href="/" class="text-purple-400 hover:text-purple-300 transition"><i class="fas fa-arrow-left mr-1"></i> Back to Candidate Login</a>
        </p>
    </div>

    <script>
        let failedAttempts = 0;
        let lockoutUntil = 0;
        const MAX_ATTEMPTS = 5;
        const LOCKOUT_SECONDS = 30;

        function getCsrfToken() {
            const name = 'csrftoken';
            const cookies = document.cookie.split(';');
            for (let c of cookies) {
                const trimmed = c.trim();
                const eqIdx = trimmed.indexOf('=');
                if (eqIdx > -1 && trimmed.substring(0, eqIdx) === name) {
                    return decodeURIComponent(trimmed.substring(eqIdx + 1));
                }
            }
            return '';
        }

        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.classList.remove('hidden');
        }

        function setButtonState(disabled, text) {
            const btn = document.getElementById('loginBtn');
            btn.disabled = disabled;
            btn.innerHTML = text;
            btn.classList.toggle('opacity-50', disabled);
            btn.classList.toggle('cursor-not-allowed', disabled);
        }

        async function login() {
            const now = Date.now();
            if (lockoutUntil > now) {
                const secsLeft = Math.ceil((lockoutUntil - now) / 1000);
                showError(`Too many failed attempts. Try again in ${secsLeft}s.`);
                return;
            }

            const password = document.getElementById('passwordInput').value.trim();
            if (!password) {
                showError('Please enter your password.');
                return;
            }

            setButtonState(true, '<i class="fas fa-spinner fa-spin mr-2"></i>Verifying...');
            document.getElementById('errorMsg').classList.add('hidden');

            try {
                const response = await fetch('/api/auth/admin-login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    setButtonState(true, '<i class="fas fa-check mr-2"></i>Access Granted');
                    setTimeout(() => { window.location.href = '/admin/dashboard/'; }, 300);
                } else {
                    failedAttempts++;
                    const data = await response.json().catch(() => ({}));
                    if (failedAttempts >= MAX_ATTEMPTS) {
                        lockoutUntil = Date.now() + LOCKOUT_SECONDS * 1000;
                        showError(`Too many failed attempts. Locked for ${LOCKOUT_SECONDS} seconds.`);
                        startLockoutCountdown();
                    } else {
                        showError(data.error || `Incorrect password. ${MAX_ATTEMPTS - failedAttempts} attempt(s) remaining.`);
                    }
                    setButtonState(false, '<i class="fas fa-shield-alt mr-2"></i>Access Admin Portal');
                }
            } catch (error) {
                showError('Connection error. Please try again.');
                setButtonState(false, '<i class="fas fa-shield-alt mr-2"></i>Access Admin Portal');
            }
        }

        function startLockoutCountdown() {
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            const interval = setInterval(() => {
                const secsLeft = Math.ceil((lockoutUntil - Date.now()) / 1000);
                if (secsLeft <= 0) {
                    clearInterval(interval);
                    failedAttempts = 0;
                    setButtonState(false, '<i class="fas fa-shield-alt mr-2"></i>Access Admin Portal');
                    document.getElementById('errorMsg').classList.add('hidden');
                } else {
                    document.getElementById('errorMsg').textContent = `Locked. Try again in ${secsLeft}s.`;
                    btn.innerHTML = `<i class="fas fa-lock mr-2"></i>Locked (${secsLeft}s)`;
                }
            }, 1000);
        }
    </script>
</body>
</html>
